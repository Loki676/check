name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Inject Apps Script URL
        run: |
          sed -i "s|YOUR_SCRIPT_URL_HERE|${{ secrets.APPS_SCRIPT_URL }}|g" index.html

      - name: Verify replacement worked
        run: grep -o "script.google.com" index.html && echo "✅ URL injected" || echo "❌ Replacement failed"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
