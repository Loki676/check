name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Apps Script URL
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: |
          if [ -z "$APPS_SCRIPT_URL" ]; then
            echo "❌ Secret APPS_SCRIPT_URL is empty or missing!"
            exit 1
          fi
          sed -i "s|YOUR_SCRIPT_URL_HERE|$APPS_SCRIPT_URL|g" index.html
          echo "✅ Done. Checking result:"
          grep "script.google.com" index.html || echo "❌ URL not found in file after replacement"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
